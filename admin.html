<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 건축기행 진주 — 관리자</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#0f1923;color:#f0f0f0;min-height:100vh;}

/* 로그인 */
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;}
.login-box{background:#1e2d3a;border-radius:12px;padding:40px;width:300px;text-align:center;}
.login-box h2{color:#82B4FF;margin-bottom:20px;font-size:16px;}
.login-box input{width:100%;padding:12px;border-radius:8px;border:1px solid #333;background:#0f1923;color:#fff;font-size:15px;text-align:center;margin-bottom:12px;}
.login-box button{width:100%;padding:12px;border-radius:8px;border:none;background:#2E5894;color:#fff;font-size:15px;cursor:pointer;font-weight:600;}

/* 대시보드 */
#dash{display:none;}
.topbar{background:#1e2d3a;padding:12px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;border-bottom:1px solid #2a3a4a;}
.topbar h1{flex:1;font-size:15px;color:#82B4FF;}
.badge{background:#2E5894;color:#fff;padding:3px 10px;border-radius:20px;font-size:12px;}
.btn-sm{padding:5px 12px;border-radius:6px;border:1px solid #444;color:#aaa;background:none;cursor:pointer;font-size:12px;}
.btn-proj{border-color:#5DB882;color:#5DB882;}

/* 탭 */
.tabs{display:flex;overflow-x:auto;background:#172533;border-bottom:1px solid #2a3a4a;padding:0 12px;}
.tab{padding:11px 16px;font-size:13px;color:#666;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;}
.tab.on{color:#82B4FF;border-bottom-color:#82B4FF;font-weight:700;}

.wrap{padding:20px;max-width:1100px;margin:0 auto;}

/* 갤러리 */
.gal-box{background:#1a2738;border-radius:10px;overflow:hidden;margin-bottom:28px;}
.gal-top{padding:10px 16px;font-size:12px;color:#82B4FF;letter-spacing:.08em;border-bottom:1px solid #2a3a4a;}
.gal-stage{position:relative;background:#000;display:flex;align-items:center;justify-content:center;min-height:240px;}
.gal-stage img{max-width:100%;max-height:60vh;display:block;}
.gal-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.55);border:none;color:#fff;font-size:26px;padding:14px 16px;cursor:pointer;line-height:1;z-index:5;}
.gal-btn:hover{background:rgba(0,0,0,.85);}
.gal-prev{left:0;border-radius:0 6px 6px 0;}
.gal-next{right:0;border-radius:6px 0 0 6px;}
.gal-info{padding:10px 16px;display:flex;justify-content:space-between;font-size:13px;background:#1e2d3a;}
.gal-author{color:#ddd;}
.gal-count{color:#82B4FF;font-weight:700;}
.gal-empty{padding:36px;text-align:center;color:#444;font-size:13px;}

/* 질문별 */
.sec-title{font-size:12px;color:#82B4FF;letter-spacing:.08em;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #2a3a4a;}
.q-block{margin-bottom:24px;}
.q-label{font-size:13px;color:#5DB882;font-weight:600;padding:7px 12px;background:rgba(45,106,79,.15);border-radius:6px;border-left:3px solid #5DB882;margin-bottom:10px;}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;}
.card{background:#1e2d3a;border-radius:8px;padding:13px;border:1px solid #2a3a4a;}
.card-head{display:flex;align-items:center;gap:7px;margin-bottom:8px;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.card-name{font-size:13px;font-weight:600;}
.card-job{font-size:11px;color:#777;margin-left:auto;}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:7px;}
.tag{padding:2px 7px;border-radius:10px;font-size:10px;background:rgba(255,255,255,.07);color:#bbb;}
.card-memo{font-size:13px;color:#ccc;line-height:1.6;}
.card-time{font-size:10px;color:#444;margin-top:6px;}
.no-data{padding:28px;text-align:center;color:#444;font-size:13px;}

body.proj .gal-stage img{max-height:80vh;}
body.proj .card-memo,.body.proj .card-name{font-size:16px;}
</style>
</head>
<body>

<div id="login">
  <div class="login-box">
    <h2>🏛 2026 건축기행 · 진주<br>관리자 로그인</h2>
    <input type="password" id="pw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">입장</button>
  </div>
</div>

<div id="dash">
  <div class="topbar">
    <h1>🏛 2026 건축기행 진주 — 현장 기록</h1>
    <span class="badge" id="badge">0건</span>
    <button class="btn-sm btn-proj" onclick="toggleProj()">📽 프로젝터</button>
    <button class="btn-sm" onclick="load()">↺ 새로고침</button>
  </div>
  <div class="tabs" id="tabs">
    <div class="tab on" data-b="전체" onclick="switchTab(this)">전체</div>
    <div class="tab" data-b="진양호 우드랜드" onclick="switchTab(this)">우드랜드</div>
    <div class="tab" data-b="물빛나루쉼터" onclick="switchTab(this)">물빛나루쉼터</div>
    <div class="tab" data-b="진주남강유등전시관" onclick="switchTab(this)">유등전시관</div>
    <div class="tab" data-b="진주성" onclick="switchTab(this)">진주성</div>
    <div class="tab" data-b="진주실크박물관" onclick="switchTab(this)">실크박물관</div>
  </div>
  <div class="wrap" id="wrap"></div>
</div>

<script>
var API = '/api/feed';
var key = '';
var bldg = '전체';
var gPhotos = [];
var gIdx = 0;
var timer = null;

var COLORS = {
  '진양호 우드랜드':'#7A6548','물빛나루쉼터':'#2D7D9A',
  '진주남강유등전시관':'#B5692E','진주성':'#5C5450','진주실크박물관':'#2D6A4F'
};

function doLogin() {
  key = document.getElementById('pw').value;
  if (!key) return;
  load();
}

function load() {
  clearTimeout(timer);
  fetch(API + '?key=' + encodeURIComponent(key) + '&building=' + encodeURIComponent(bldg))
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (!d.ok) { alert('오류: ' + d.error); return; }
      document.getElementById('login').style.display = 'none';
      document.getElementById('dash').style.display = 'block';
      document.getElementById('badge').textContent = (d.total||0) + '건';
      render(d.data || []);
      timer = setTimeout(load, 30000);
    })
    .catch(function(e){ alert('연결 오류'); });
}

function switchTab(el) {
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('on'); });
  el.classList.add('on');
  bldg = el.dataset.b;
  load();
}

function render(rows) {
  var wrap = document.getElementById('wrap');

  // 사진 수집
  gPhotos = [];
  rows.forEach(function(r) {
    var urls = (r['사진URL']||'').split('|').map(function(u){ return u.trim(); }).filter(Boolean);
    urls.forEach(function(url) {
      gPhotos.push({ url:url, name:r['이름']||'익명', job:r['호차']||'', bldg:r['건물']||'' });
    });
  });
  gIdx = 0;

  // 갤러리 HTML
  var gHtml = '<div class="gal-box">';
  gHtml += '<div class="gal-top">📷 사진 — ' + gPhotos.length + '장</div>';
  if (gPhotos.length > 0) {
    var p0 = gPhotos[0];
    gHtml += '<div class="gal-stage">';
    gHtml += '<img id="gimg" src="' + p0.url + '" alt="">';
    if (gPhotos.length > 1) {
      gHtml += '<button class="gal-btn gal-prev" onclick="gMove(-1)">&#8249;</button>';
      gHtml += '<button class="gal-btn gal-next" onclick="gMove(1)">&#8250;</button>';
    }
    gHtml += '</div>';
    gHtml += '<div class="gal-info">';
    gHtml += '<span class="gal-author" id="gauthor">' + p0.name + (p0.job?' · '+p0.job:'') + (p0.bldg?' · '+p0.bldg:'') + '</span>';
    gHtml += '<span class="gal-count" id="gcnt">1 / ' + gPhotos.length + '</span>';
    gHtml += '</div>';
  } else {
    gHtml += '<div class="gal-empty">제출된 사진이 없습니다.</div>';
  }
  gHtml += '</div>';

  // 질문별 기록
  var qMap = {};
  rows.forEach(function(r) {
    var q = (r['질문']||'').trim() || '질문 없음 (간편 기록)';
    if (!qMap[q]) qMap[q] = [];
    qMap[q].push(r);
  });

  var qHtml = '<div class="sec-title">💬 질문별 기록</div>';
  Object.keys(qMap).forEach(function(q) {
    qHtml += '<div class="q-block"><div class="q-label">' + q + '</div><div class="cards">';
    qMap[q].forEach(function(r) {
      var color = COLORS[r['건물']] || '#607282';
      var tags = (r['태그']||'').split('/').filter(Boolean).map(function(t){
        return '<span class="tag">'+t.trim()+'</span>';
      }).join('');
      qHtml += '<div class="card">'
        + '<div class="card-head">'
        + '<div class="dot" style="background:'+color+'"></div>'
        + '<span class="card-name">'+(r['이름']||'익명')+'</span>'
        + '<span class="card-job">'+(r['호차']||'')+'</span>'
        + '</div>'
        + (tags ? '<div class="card-tags">'+tags+'</div>' : '')
        + (r['소감'] ? '<div class="card-memo">'+r['소감']+'</div>' : '')
        + '<div class="card-time">'+(r['시각']||'')+'</div>'
        + '</div>';
    });
    qHtml += '</div></div>';
  });

  wrap.innerHTML = gHtml + (rows.length ? qHtml : '<div class="no-data">아직 기록이 없습니다.</div>');
}

function gMove(dir) {
  if (!gPhotos.length) return;
  gIdx = (gIdx + dir + gPhotos.length) % gPhotos.length;
  var p = gPhotos[gIdx];
  var img = document.getElementById('gimg');
  var aut = document.getElementById('gauthor');
  var cnt = document.getElementById('gcnt');
  if (img) img.src = p.url;
  if (aut) aut.textContent = p.name + (p.job?' · '+p.job:'') + (p.bldg?' · '+p.bldg:'');
  if (cnt)  cnt.textContent = (gIdx+1) + ' / ' + gPhotos.length;
}

function toggleProj() {
  document.body.classList.toggle('proj');
}
</script>
</body>
</html>
