<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 건축기행 진주 — 현장 기록</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #111A20;
  --surface:  #19262F;
  --surface2: #1F3040;
  --border:   rgba(255,255,255,.07);
  --cobalt:   #2E5894;
  --cobalt-l: #4A7EC2;
  --viridian: #2D6A4F;
  --charcoal: #2F3E46;
  --text:     #E8EDF2;
  --text-2:   #8FA3B0;
  --text-3:   #506070;
  --accent:   #82B4FF;
  --green:    #5DB882;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}

/* ── 로그인 ─────────────────────────────── */
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:radial-gradient(ellipse at 30% 50%, rgba(46,88,148,.18) 0%, transparent 60%),
             radial-gradient(ellipse at 70% 30%, rgba(45,106,79,.12) 0%, transparent 50%), var(--bg);}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:48px 40px;width:320px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.4);}
.login-logo{font-size:11px;letter-spacing:.2em;color:var(--text-3);text-transform:uppercase;margin-bottom:8px;font-family:'DM Mono',monospace;}
.login-title{font-size:22px;font-weight:700;color:var(--text);margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--text-2);margin-bottom:32px;}
.login-card input{width:100%;padding:13px 16px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:15px;text-align:center;margin-bottom:12px;font-family:'Noto Sans KR',sans-serif;transition:border-color .2s;}
.login-card input:focus{outline:none;border-color:var(--cobalt-l);}
.login-card button{width:100%;padding:13px;border-radius:10px;border:none;background:var(--cobalt);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;letter-spacing:.04em;transition:background .2s;}
.login-card button:hover{background:var(--cobalt-l);}

/* ── 대시보드 ────────────────────────────── */
#dash{display:none;}

/* 상단 바 */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;gap:16px;height:56px;position:sticky;top:0;z-index:100;backdrop-filter:blur(8px);}
.topbar-brand{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.14em;color:var(--text-3);text-transform:uppercase;}
.topbar-title{font-size:14px;font-weight:600;color:var(--text);flex:1;margin-left:12px;}
.badge{background:rgba(46,88,148,.3);color:var(--accent);border:1px solid rgba(130,180,255,.2);padding:3px 12px;border-radius:20px;font-size:12px;font-family:'DM Mono',monospace;font-weight:500;}
.btn-proj{padding:6px 14px;border-radius:8px;border:1px solid rgba(93,184,130,.3);color:var(--green);background:rgba(93,184,130,.08);cursor:pointer;font-size:12px;font-family:'Noto Sans KR',sans-serif;transition:all .2s;}
.btn-proj:hover{background:rgba(93,184,130,.15);}
.btn-ref{padding:6px 14px;border-radius:8px;border:1px solid var(--border);color:var(--text-2);background:none;cursor:pointer;font-size:12px;font-family:'Noto Sans KR',sans-serif;transition:all .2s;}
.btn-ref:hover{border-color:rgba(255,255,255,.2);color:var(--text);}

/* 탭 */
.tabs{background:var(--surface);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;padding:0 20px;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:13px 18px;font-size:13px;color:var(--text-3);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;font-weight:400;}
.tab:hover{color:var(--text-2);}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}

/* 본문 */
.wrap{padding:28px;max-width:1140px;margin:0 auto;}

/* 섹션 헤더 */
.sec-head{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.sec-icon{font-size:14px;}
.sec-label{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;color:var(--accent);text-transform:uppercase;}
.sec-count{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-3);}
.sec-line{flex:1;height:1px;background:var(--border);}

/* 갤러리 */
.gal-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:32px;}
.gal-stage{position:relative;background:#0A1218;display:flex;align-items:center;justify-content:center;min-height:280px;cursor:zoom-in;}
.gal-stage img{max-width:100%;max-height:62vh;display:block;object-fit:contain;}
.gal-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.08);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.8);font-size:22px;width:44px;height:64px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:8px;transition:all .2s;z-index:5;}
.gal-btn:hover{background:rgba(255,255,255,.18);color:#fff;}
.gal-prev{left:12px;}
.gal-next{right:12px;}
.gal-foot{padding:12px 18px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);}
.gal-author{font-size:13px;color:var(--text);font-weight:500;}
.gal-author span{color:var(--text-2);font-weight:300;margin-left:6px;font-size:12px;}
.gal-counter{font-family:'DM Mono',monospace;font-size:13px;color:var(--accent);font-weight:500;}
.gal-empty{padding:48px;text-align:center;color:var(--text-3);font-size:13px;}

/* 질문별 기록 */
.q-block{margin-bottom:24px;}
.q-label{font-size:13px;color:var(--green);font-weight:600;padding:8px 14px;background:rgba(45,106,79,.1);border-radius:8px;border-left:3px solid var(--viridian);margin-bottom:12px;line-height:1.5;}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:10px;}
.card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;transition:border-color .2s;}
.card:hover{border-color:rgba(255,255,255,.14);}
.card-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.card-name{font-size:13px;font-weight:600;color:var(--text);}
.card-job{font-size:11px;color:var(--text-3);margin-left:auto;font-family:'DM Mono',monospace;}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.tag{padding:2px 8px;border-radius:8px;font-size:11px;background:rgba(46,88,148,.2);color:var(--accent);border:1px solid rgba(46,88,148,.25);}
.card-memo{font-size:13px;color:var(--text-2);line-height:1.7;font-weight:300;}
.card-time{font-size:10px;color:var(--text-3);margin-top:8px;font-family:'DM Mono',monospace;}
.no-data{padding:48px;text-align:center;color:var(--text-3);font-size:13px;}

/* 전체화면 */
#fs{display:none;position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:9999;flex-direction:column;align-items:center;justify-content:center;}
#fs.on{display:flex;}
#fs-img{max-width:96vw;max-height:84vh;object-fit:contain;border-radius:4px;}
#fs-bar{position:absolute;bottom:0;left:0;right:0;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(transparent,rgba(0,0,0,.7));}
#fs-info{font-size:14px;color:rgba(255,255,255,.85);}
#fs-cnt{font-family:'DM Mono',monospace;font-size:14px;color:var(--accent);}
#fs-close{position:absolute;top:16px;right:20px;background:rgba(255,255,255,.1);border:none;color:#fff;width:40px;height:40px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;}
#fs-close:hover{background:rgba(255,255,255,.2);}
.fs-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#fff;font-size:28px;width:52px;height:80px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:8px;transition:background .2s;}
.fs-nav:hover{background:rgba(255,255,255,.18);}
#fs-prev{left:12px;}#fs-next{right:12px;}

/* 프로젝터 모드 */
body.proj .gal-stage img{max-height:78vh;}
body.proj .card-memo{font-size:15px;color:var(--text);}
body.proj .card-name{font-size:15px;}
body.proj .q-label{font-size:15px;}
</style>
</head>
<body>

<div id="login">
  <div class="login-card">
    <div class="login-logo">ARCHIVIA · 2026</div>
    <div class="login-title">건축기행 진주</div>
    <div class="login-sub">현장 기록 대시보드</div>
    <input type="password" id="pw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">입장하기</button>
  </div>
</div>

<div id="dash">
  <div class="topbar">
    <span class="topbar-brand">ARCHIVIA</span>
    <span class="topbar-title">2026 건축기행 · 진주</span>
    <span class="badge" id="badge">0건</span>
    <button class="btn-proj" onclick="toggleProj()">📽 프로젝터</button>
    <button class="btn-ref" onclick="load()">↺ 새로고침</button>
  </div>
  <div class="tabs" id="tabs">
    <div class="tab on" data-b="전체" onclick="switchTab(this)">전체</div>
    <div class="tab" data-b="진양호 우드랜드" onclick="switchTab(this)">우드랜드</div>
    <div class="tab" data-b="물빛나루쉼터" onclick="switchTab(this)">물빛나루쉼터</div>
    <div class="tab" data-b="진주남강유등전시관" onclick="switchTab(this)">유등전시관</div>
    <div class="tab" data-b="진주성" onclick="switchTab(this)">진주성</div>
    <div class="tab" data-b="진주실크박물관" onclick="switchTab(this)">실크박물관</div>
  </div>
  <div class="wrap" id="wrap"></div>
</div>

<!-- 전체화면 -->
<div id="fs" onclick="if(event.target===this)closeFull()">
  <button id="fs-close" onclick="closeFull()">✕</button>
  <button class="fs-nav" id="fs-prev" onclick="fsMove(-1)">‹</button>
  <img id="fs-img" src="" alt="">
  <button class="fs-nav" id="fs-next" onclick="fsMove(1)">›</button>
  <div id="fs-bar">
    <div id="fs-info"></div>
    <div id="fs-cnt"></div>
  </div>
</div>

<script>
var API='/api/feed', key='', bldg='전체';
var gPhotos=[], gIdx=0, timer=null;
var COLORS={'진양호 우드랜드':'#7A6548','물빛나루쉼터':'#2D7D9A','진주남강유등전시관':'#B5692E','진주성':'#8C7B6E','진주실크박물관':'#2D6A4F'};

function doLogin(){
  key=document.getElementById('pw').value;
  if(!key)return;
  load();
}

function load(){
  clearTimeout(timer);
  fetch(API+'?key='+encodeURIComponent(key)+'&building='+encodeURIComponent(bldg))
    .then(function(r){return r.json();})
    .then(function(d){
      if(!d.ok){alert('오류: '+d.error);return;}
      document.getElementById('login').style.display='none';
      document.getElementById('dash').style.display='block';
      document.getElementById('badge').textContent=(d.total||0)+'건';
      render(d.data||[]);
      timer=setTimeout(load,30000);
    }).catch(function(){alert('연결 오류');});
}

function switchTab(el){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  el.classList.add('on');
  bldg=el.dataset.b;
  load();
}

function render(rows){
  var wrap=document.getElementById('wrap');

  // 사진 수집
  gPhotos=[];
  rows.forEach(function(r){
    var urls=(r['사진URL']||'').split('|').map(function(u){return u.trim();}).filter(Boolean);
    urls.forEach(function(url){
      gPhotos.push({url:url, name:r['이름']||'', job:r['호차']||r['직종']||'', bldg:r['건물']||''});
    });
  });
  gIdx=0;

  var p0=gPhotos[0];
  var galHtml='<div class="sec-head"><span class="sec-icon">📷</span><span class="sec-label">사진 갤러리</span><span class="sec-count">— '+gPhotos.length+'장</span><div class="sec-line"></div></div>';
  galHtml+='<div class="gal-box">';
  if(gPhotos.length>0){
    galHtml+='<div class="gal-stage" id="gal-stage">';
    galHtml+='<img id="gimg" src="'+p0.url+'" alt="" onclick="openFull(gIdx)">';
    if(gPhotos.length>1){
      galHtml+='<button class="gal-btn gal-prev" onclick="gMove(-1)">&#8249;</button>';
      galHtml+='<button class="gal-btn gal-next" onclick="gMove(1)">&#8250;</button>';
    }
    galHtml+='</div>';
    galHtml+='<div class="gal-foot">';
    galHtml+='<div class="gal-author" id="gauthor">'+fmtAuthor(p0)+'</div>';
    galHtml+='<div class="gal-counter" id="gcnt">1 / '+gPhotos.length+'</div>';
    galHtml+='</div>';
  } else {
    galHtml+='<div class="gal-empty">아직 사진이 없습니다.</div>';
  }
  galHtml+='</div>';

  // 질문별
  var qMap={};
  rows.forEach(function(r){
    var q=(r['질문']||'').trim()||'간편 기록';
    if(!qMap[q])qMap[q]=[];
    qMap[q].push(r);
  });

  var qHtml='<div class="sec-head" style="margin-top:8px;cursor:pointer;" onclick="toggleRecords()">'
    +'<span class="sec-icon">💬</span><span class="sec-label">질문별 기록</span>'
    +'<div class="sec-line"></div>'
    +'<span id="rec-toggle-btn" style="font-size:12px;color:var(--text-3);font-family:DM Mono,monospace;white-space:nowrap;margin-left:8px;">접기 ↑</span>'
    +'</div>'
    +'<div id="rec-body">';
  var qIdx=0;
  Object.keys(qMap).forEach(function(q){
    var bid='qb-'+qIdx; qIdx++;
    qHtml+='<div class="q-block">'
      +'<div class="q-label" data-bid="'+bid+'" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center;" onclick="toggleQ(this)">'
      +'<span>'+q+'</span>'
      +'<span id="'+bid+'-btn" style="font-family:DM Mono,monospace;font-size:11px;color:var(--text-3);margin-left:12px;flex-shrink:0;">접기 ↑</span>'
      +'</div>'
      +'<div id="'+bid+'" class="cards">';
    qMap[q].forEach(function(r){
      var color=COLORS[r['건물']]||'#607282';
      var tags=(r['태그']||'').split('/').filter(Boolean).map(function(t){return '<span class="tag">'+t.trim()+'</span>';}).join('');
      qHtml+='<div class="card">'
        +'<div class="card-head"><div class="dot" style="background:'+color+'"></div>'
        +'<span class="card-name">'+(r['이름']||'익명')+'</span>'
        +'<span class="card-job">'+(r['호차']||r['직종']||'')+'</span></div>'
        +(tags?'<div class="card-tags">'+tags+'</div>':'')
        +(r['소감']?'<div class="card-memo">'+r['소감']+'</div>':'')
        +'<div class="card-time">'+(r['시각']||'')+'</div></div>';
    });
    qHtml+='</div></div>';
  });

  if(rows.length) qHtml+='</div>'; // rec-body 닫기
  wrap.innerHTML=galHtml+(rows.length?qHtml:'<div class="no-data">아직 기록이 없습니다.</div>');

  // 터치 스와이프
  initSwipe('gal-stage', function(dir){gMove(dir);});
}

function fmtAuthor(p){
  var s=p.name||'';
  if(p.job) s+=(s?'<span>/'+p.job+'</span>':'<span>'+p.job+'</span>');
  if(p.bldg) s+=(s?' <span style="opacity:.4">·</span> <span>'+p.bldg+'</span>':'');
  return s||'<span style="opacity:.4">이름 미입력</span>';
}

function gMove(dir){
  if(!gPhotos.length)return;
  gIdx=(gIdx+dir+gPhotos.length)%gPhotos.length;
  var p=gPhotos[gIdx];
  var img=document.getElementById('gimg');
  var aut=document.getElementById('gauthor');
  var cnt=document.getElementById('gcnt');
  if(img)img.src=p.url;
  if(aut)aut.innerHTML=fmtAuthor(p);
  if(cnt)cnt.textContent=(gIdx+1)+' / '+gPhotos.length;
}

// 전체화면
function openFull(idx){
  if(!gPhotos.length)return;
  gIdx=idx;
  fsRefresh();
  document.getElementById('fs').classList.add('on');
  document.body.style.overflow='hidden';
  initSwipe('fs',function(dir){fsMove(dir);});
}
function closeFull(){
  document.getElementById('fs').classList.remove('on');
  document.body.style.overflow='';
}
function fsMove(dir){
  gIdx=(gIdx+dir+gPhotos.length)%gPhotos.length;
  fsRefresh();
}
function fsRefresh(){
  var p=gPhotos[gIdx];
  document.getElementById('fs-img').src=p.url;
  var info=p.name||'';
  if(p.job)info+='/'+p.job;
  if(p.bldg)info+=' · '+p.bldg;
  document.getElementById('fs-info').textContent=info;
  document.getElementById('fs-cnt').textContent=(gIdx+1)+' / '+gPhotos.length;
}

// 터치 스와이프 공통
function initSwipe(id, cb){
  var el=document.getElementById(id);
  if(!el)return;
  var sx=0;
  el.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;},{passive:true});
  el.addEventListener('touchend',function(e){
    var dx=e.changedTouches[0].clientX-sx;
    if(Math.abs(dx)>40)cb(dx<0?1:-1);
  },{passive:true});
}

// 키보드
document.addEventListener('keydown',function(e){
  var fs=document.getElementById('fs');
  if(fs&&fs.classList.contains('on')){
    if(e.key==='ArrowLeft')fsMove(-1);
    else if(e.key==='ArrowRight')fsMove(1);
    else if(e.key==='Escape')closeFull();
  }
});

function toggleProj(){document.body.classList.toggle('proj');}

function toggleQ(el){
  var bid=el.dataset.bid;
  var body=document.getElementById(bid);
  var btn=document.getElementById(bid+'-btn');
  if(!body)return;
  if(body.style.display==='none'){
    body.style.display='';
    if(btn)btn.textContent='접기 ↑';
  } else {
    body.style.display='none';
    if(btn)btn.textContent='펼치기 ↓';
  }
}

function toggleRecords(){
  var body = document.getElementById('rec-body');
  var btn  = document.getElementById('rec-toggle-btn');
  if(!body) return;
  if(body.style.display === 'none'){
    body.style.display = '';
    btn.textContent = '접기 ↑';
  } else {
    body.style.display = 'none';
    btn.textContent = '펼치기 ↓';
  }
}
</script>
</body>
</html>
